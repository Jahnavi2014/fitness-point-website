<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitnessPoint - Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        .header {
            background: url('https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg') center/cover;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 0 3px 10px rgba(0,0,0,0.6);
            font-size: 42px;
            font-weight: bold;
        }

        .gallery-container {
            width: 90%;
            margin: 50px auto;
        }

        .section-title {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #111;
            text-align: center;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-img {
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .gallery-img img {
            width: 100%;
            height: 230px;
            object-fit: cover;
            transition: 0.3s;
        }

        .gallery-img:hover img {
            transform: scale(1.07);
        }

        /* Back Button */
        .back-btn {
            display: inline-block;
            margin: 25px auto;
            padding: 12px 24px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 18px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #42d1d4;
            color: #000;
        }

        .center {
            text-align: center;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="header">
        FitnessPoint Gallery
    </div>

    <div class="gallery-container">

        <h2 class="section-title">Explore Our Fitness World</h2>

        <!-- GALLERY GRID -->
        <div class="gallery-grid">

            <!-- Gym Area -->
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/1954524/pexels-photo-1954524.jpeg">
            </div>

            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/1552252/pexels-photo-1552252.jpeg">
            </div>

            <!-- Equipment -->
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/11183203/pexels-photo-11183203.jpeg">
            </div>

            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/1552104/pexels-photo-1552104.jpeg">
            </div>

            <!-- Workout sessions -->
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/949129/pexels-photo-949129.jpeg">
            </div>

            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/3757375/pexels-photo-3757375.jpeg">
            </div>

            <!-- Group classes -->
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/1552103/pexels-photo-1552103.jpeg">
            </div>

            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/6539796/pexels-photo-6539796.jpeg">
            </div>

            <!-- Transformation -->
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg">
            </div>

            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/3823039/pexels-photo-3823039.jpeg">
            </div>

            
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/6392833/pexels-photo-6392833.jpeg">
            </div>

            
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/26776093/pexels-photo-26776093.jpeg">
            </div>

            
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/11175793/pexels-photo-11175793.jpeg">
            </div>

            
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/17210045/pexels-photo-17210045.jpeg">
            </div>

            
            <div class="gallery-img">
                <img src="https://images.pexels.com/photos/4164654/pexels-photo-4164654.jpeg">
            </div>




        </div>

        <div class="center">
            <a href="index.html" class="back-btn">⬅ Back to Home</a>
        </div>

    </div>

</body>
</html>
